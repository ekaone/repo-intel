name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            pkg: repo-intel-linux-x64
            binary: repo-intel

          - target: aarch64-apple-darwin
            os: macos-latest
            pkg: repo-intel-darwin-arm64
            binary: repo-intel

          - target: x86_64-apple-darwin
            os: macos-latest
            pkg: repo-intel-darwin-x64
            binary: repo-intel

          - target: x86_64-pc-windows-gnu
            os: windows-latest
            pkg: repo-intel-win32-x64
            binary: repo-intel.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p repo-intel-core

      - name: Copy binary to package
        run: |
          mkdir -p packages/${{ matrix.pkg }}/bin
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} packages/${{ matrix.pkg }}/bin/
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.pkg }}
          path: packages/${{ matrix.pkg }}/bin/

  publish:
    name: Publish npm packages
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: packages/

      - name: Build JS packages
        run: pnpm build

      - name: Publish platform packages
        run: |
          pnpm -r --filter "repo-intel-linux-x64" publish --access public --no-git-checks
          pnpm -r --filter "repo-intel-darwin-arm64" publish --access public --no-git-checks
          pnpm -r --filter "repo-intel-darwin-x64" publish --access public --no-git-checks
          pnpm -r --filter "repo-intel-win32-x64" publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main package
        run: pnpm -r --filter "repo-intel" publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
