[target.x86_64-unknown-linux-gnu]
linker = "x86_64-linux-gnu-gcc"

[target.x86_64-apple-darwin]
rustflags = ["-C", "link-arg=-undefined", "-C", "link-arg=dynamic_lookup"]

[target.aarch64-apple-darwin]
rustflags = ["-C", "link-arg=-undefined", "-C", "link-arg=dynamic_lookup"]

[target.x86_64-pc-windows-gnu]
linker = "x86_64-w64-mingw32-gcc"
ar = "x86_64-w64-mingw32-ar"

[alias]
build-linux = "build --release --target x86_64-unknown-linux-gnu"
build-mac-arm = "build --release --target aarch64-apple-darwin"
build-mac-x64 = "build --release --target x86_64-apple-darwin"
build-win = "build --release --target x86_64-pc-windows-gnu"
